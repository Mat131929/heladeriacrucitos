<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Heladería Crucitos V2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para Contacto (Color de image_0.png) */
        h2 { border-bottom: 3px solid var(--secondary-gray); display: inline-block; padding-bottom: 5px; margin-bottom: 40px;}
        .contacto-section { text-align: center; }
        .grid-contacto {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .card { border-top: 5px solid var(--secondary-gray); }
        .social-link { text-decoration: none; color: var(--secondary-gray); font-weight: 700; display: block; margin-bottom: 5px;}
        
        /* Estilos del Widget de Chat (Quetzal) */
        #chat-widget { background-color: var(--secondary-purple); border: 2px solid white;}
    </style>
</head>
<body>
    <nav class="banner-nav">
        <div class="container">
            <a href="index.html">← Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="catalogo.html">Catálogo</a>
        </div>
    </nav>

    <main class="container contacto-section">
        <!-- Sección de Fer: Medios de contacto y promoción -->
        <section>
            <h2>¡Contáctanos!</h2>
            <div class="grid-contacto">
                <div class="card">
                    <h3 class="card-title">Teléfono y WhatsApp</h3>
                    <p>+52 (123) 456-7890</p>
                </div>
                <div class="card">
                    <h3 class="card-title">Redes Sociales</h3>
                    <a href="#" class="social-link">@HeladeriaCrucitos</a>
                    <a href="#" class="social-link">facebook.com/Crucitos</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Sección de Quetzal: API de mensajería automática (Widget Flotante) -->
    <!-- Este widget aparece de forma profesional en todas las páginas -->
    <div id="chat-widget" title="Asistente Virtual">
        💬
    </div>

    <footer>
        <div class="container">
            <p>Crucitos</p>
            <p class="team-credits">© 2026. Fer y Quetzal.</p>
        </div>
    </footer>
</body>
</html>
